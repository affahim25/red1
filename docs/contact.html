</head>
<body>
<div class="topbar">
  <div class="nav">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1 id="siteName">Bangladesh Red Crescent Society</h1>
        <p id="siteTag" class="muted">Public Website</p>
      </div>
    </div>
    <div class="menu">
      <a class="pill" href="index.html">Home</a>
      <a class="pill" href="activities.html">activities</a>
      <a class="pill" href="members.html">সদস্য</a>

      <a class="pill" href="announcements.html">🔔 Announcement</a>
      <a class="pill" href="admin/login.html">Admin</a>
    </div>
  </div>
</div>
<div class="container">

  <div class="card">
    <h2>Contact</h2>
    <p class="muted">Admin panel থেকে Contact info সেট করলে এখানে দেখাবে।</p>
    <div class="hr"></div>
    <div id="mapBox" class="mapWrap"></div>
    <div class="row">
      <div class="card col-6" style="background: rgba(255,255,255,.03)">
        <h3>Contact Info</h3>
        <div id="info" class="muted">Loading…</div>
      </div>
      <div class="card col-6" style="background: rgba(255,255,255,.03)">
        <h3>somethings</h3>
        <div id="mapBox" class="muted">—</div>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { FIREBASE_CONFIG, esc } from "./assets/app.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);

  const snap = await getDoc(doc(db,"site","contact"));
  const data = snap.exists()? snap.data() : {};

  const info = document.getElementById("info");
  info.innerHTML = `
    <div><b>Phone:</b> ${esc(data.phone || "—")}</div>
    <div><b>Email:</b> ${esc(data.email || "—")}</div>
    <div><b>Address:</b> ${esc(data.address || "—")}</div>
  `;

const mapBox = document.getElementById("mapBox");

if (data.mapUrl) {
  mapBox.innerHTML = `
    <div class="mapWrap">
      <iframe
        class="mapFrame"
        src="${data.mapUrl}"
        loading="lazy"
        allowfullscreen
        referrerpolicy="no-referrer-when-downgrade"
        title="Location Map"
      ></iframe>
    </div>
  `;
} else {
  mapBox.textContent = "Map URL not set.";
}
</script>
  <div class="footer">© <span id="year"></span> Bangladesh Red Crescent Society</div>
</div>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body></html>
