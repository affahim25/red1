<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { FIREBASE_CONFIG, esc } from "./assets/app.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);

  const snap = await getDoc(doc(db,"site","rules"));
  const data = snap.exists()? snap.data() : {};
  // simple safe render (text). If you want HTML, store contentHtml and render with innerHTML carefully.
  document.getElementById("content").textContent = data.content || "Admin panel থেকে Rules যোগ করুন।";
</script>
