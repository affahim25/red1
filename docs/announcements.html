<head>
  <meta charset="utf-8"/>

  <link rel="stylesheet" href="assets/app.css"/>
  
</head>
<body>
<div class="topbar">
  <div class="nav">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1 id="siteName">Red Crescent Araihazar Unit</h1>
        <p id="siteTag" class="muted">Public Website</p>
      </div>
    </div>
    <div class="menu">
      <a class="pill" href="index.html">Home</a>
      <a class="pill" href="activities.html">কার্যক্রম</a>
      <a class="pill" href="members.html">সদস্য</a>
      <a class="pill" href="rules.html">নিয়মাবলী</a>
      <a class="pill" href="apply.html">নতুন ভলান্টিয়ার</a>
      <a class="pill" href="contact.html">Contact</a>
      <a class="pill" href="announcements.html">🔔 Announcement</a>
      <a class="pill" href="../admin/login.html">Admin</a>
    </div>
  </div>
</div>
<div class="container">

  <div class="card">
    <h2>Announcements</h2>
    <p class="muted">এখানে সব নোটিশ দেখাবে (Active/Inactive সহ)। Public এ Active গুলো বেশি গুরুত্বপূর্ণ।</p>
    <div class="hr"></div>

    <div class="field">
      <label>Search</label>
      <input id="q" placeholder="title/body..." />
    </div>

    <div id="list" class="row"></div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { FIREBASE_CONFIG, esc, fmtDate } from "../assets/app.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);

  const listEl = document.getElementById("list");
  const qEl = document.getElementById("q");
  let all = [];

  function badgeActive(v){
    return `<span class="badge ${v? "ok":"bad"}">${v? "Active":"Inactive"}</span>`;
  }

  function render(){
    const q = (qEl.value||"").trim().toLowerCase();
    const items = q ? all.filter(a =>
      (a.title||"").toLowerCase().includes(q) ||
      (a.body||"").toLowerCase().includes(q)
    ) : all;
    listEl.innerHTML = items.map(a => `
      <div class="card col-6">
        <div style="display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
          <div style="font-weight:850">${esc(a.title || "—")}</div>
          ${badgeActive(!!a.isActive)}
        </div>
        <div class="muted small" style="margin-top:8px; white-space:pre-wrap">${esc(a.body||"")}</div>
        <div class="small muted" style="margin-top:10px">Date: ${fmtDate(a.date)}</div>
      </div>
    `).join("") || `<div class="muted">No announcements.</div>`;
  }

  qEl.addEventListener("input", render);

  const q1 = query(collection(db,"announcements"), orderBy("date","desc"));
  onSnapshot(q1, (snap)=>{
    all = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  });
</script>
  <div class="footer">© <span id="year"></span> Red Crescent Araihazar Unit</div>
</div>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body></html>
