<body>
<div class="topbar">
  <div class="nav">

      <div class="logo"></div>
      <div>
        <h1 id="siteName">Red Crescent Araihazar Unit</h1>

      </div>
    </div>
    <div class="menu">
      <a class="pill" href="index.html">Home</a>

      <a class="pill" href="members.html">সদস্য</a>

      <a class="pill" href="../admin/login.html">Admin</a>
    </div>
  </div>
</div>
<div class="container">

  <div class="card">
    <h2>কার্যক্রম</h2>
    <p class="muted">Admin panel থেকে কার্যক্রম যোগ/আপডেট করলে এখানে দেখাবে।</p>
    <div class="hr"></div>

    <div class="field">
      <label>Search</label>
      <input id="q" placeholder="কার্যক্রম খুঁজুন (title)..." />
    </div>

    <div id="list" class="row"></div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { FIREBASE_CONFIG, esc, fmtDate } from "../assets/app.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);

  const listEl = document.getElementById("list");
  const qEl = document.getElementById("q");

  let all = [];

  function render(){
    const q = (qEl.value||"").trim().toLowerCase();
    const items = q ? all.filter(x => (x.title||"").toLowerCase().includes(q)) : all;
    listEl.innerHTML = items.map(a => `
      <div class="card col-4">
        ${a.coverUrl ? `<img src="${a.coverUrl}" alt="cover" style="width:100%; border-radius:14px; border:1px solid var(--border); margin-bottom:10px">` : ""}
        <div style="font-weight:850">${esc(a.title||"—")}</div>
        <div class="muted small" style="margin-top:6px">${esc(a.desc||"").slice(0,160)}${(a.desc||"").length>160?"…":""}</div>
        <div class="small muted" style="margin-top:10px">Date: ${fmtDate(a.date)}</div>
      </div>
    `).join("") || `<div class="muted">No activities yet.</div>`;
  }

  qEl.addEventListener("input", render);

  const q1 = query(collection(db,"activities"), orderBy("date","desc"));
  onSnapshot(q1, (snap)=>{
    all = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  });
</script>
  <div class="footer">© <span id="year"></span> Red Crescent Araihazar Unit</div>
</div>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body></html>
