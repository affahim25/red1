  <meta charset="utf-8"/>

</head>
<body>
<div class="topbar">
  <div class="nav">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1 id="siteName">Red Crescent Araihazar Unit</h1>
        <p id="siteTag" class="muted">Public Website</p>
      </div>
    </div>
    <div class="menu">
      <a class="pill" href="index.html">Home</a>
      <a class="pill" href="activities.html">কার্যক্রম</a>
      <a class="pill" href="members.html">সদস্য</a>
      <a class="pill" href="rules.html">নিয়মাবলী</a>
      <a class="pill" href="apply.html">নতুন ভলান্টিয়ার</a>
      <a class="pill" href="contact.html">Contact</a>
      <a class="pill" href="announcements.html">🔔 Announcement</a>
      <a class="pill" href="admin/login.html">Admin</a>
    </div>
  </div>
</div>
<div class="container">

  <div class="card">
    <h2>সদস্য তালিকা</h2>
    <p class="muted">Accepted/Active সদস্যগুলো এখানে দেখাবে।</p>
    <div class="hr"></div>

    <div class="field">
      <label>Search</label>
      <input id="q" placeholder="নাম/রোল/ফোন..." />
    </div>

    <div style="overflow:auto;">
      <table>
        <thead>
          <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Role</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" class="muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { FIREBASE_CONFIG, esc, fmtDate } from "../assets/app.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);

  const tbody = document.getElementById("tbody");
  const qEl = document.getElementById("q");
  let all = [];

  function badge(s){
    const v = (s||"inactive").toLowerCase();
    return `<span class="badge ${v==="active"?"ok":"bad"}">${v==="active"?"Active":"Inactive"}</span>`;
  }

  function render(){
    const q = (qEl.value||"").trim().toLowerCase();
    const items = q ? all.filter(m =>
      (m.name||"").toLowerCase().includes(q) ||
      (m.role||"").toLowerCase().includes(q) ||
      (m.phone||"").toLowerCase().includes(q)
    ) : all;

    tbody.innerHTML = items.map(m => `
      <tr>
        <td>${m.photoUrl ? `<img src="${m.photoUrl}" style="width:44px;height:44px;border-radius:14px;border:1px solid var(--border);object-fit:cover">` : "—"}</td>
        <td>${esc(m.name||"—")}</td>
        <td>${esc(m.role||"—")}</td>
        <td>${esc(m.phone||"—")}</td>
        <td>${badge(m.status)}</td>
        <td>${fmtDate(m.joinedDate)}</td>
      </tr>
    `).join("") || `<tr><td colspan="6" class="muted">No members.</td></tr>`;
  }

  qEl.addEventListener("input", render);

  const q1 = query(collection(db,"members"), where("status","==","active"), orderBy("joinedDate","desc"));
  onSnapshot(q1, (snap)=>{
    all = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  });
</script>
  <div class="footer">© <span id="year"></span> Red Crescent Araihazar Unit</div>
</div>
<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body></html>
