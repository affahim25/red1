<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard</title>

<link rel="stylesheet" href="../assets/app.css"/>

<style>
body{
  background:#0f172a;
  color:#fff;
  font-family:system-ui;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.panel{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  padding:16px;
  margin-bottom:20px;
}
h2{margin:0 0 10px 0}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.2);
  background:#1e293b;
  color:#fff;
}
button{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:700;
}
.btn{
  background:#14b8a6;
  color:#000;
}
.btn.danger{
  background:#ef4444;
  color:#fff;
}
.table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
.table th,.table td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.1);
  text-align:left;
  font-size:14px;
}
.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  object-fit:cover;
}
</style>
</head>

<body>
<div class="container">

<h1>🔥 Admin Dashboard</h1>

<!-- ================= Committee Manager ================= -->

<div class="panel">
<h2>Committee Manager</h2>

<div class="grid">
<select id="c_unit">
<option value="upazila">Upazila</option>
<option value="school">School</option>
</select>

<select id="c_position">
<option>Leader</option>
<option>Assistant Leader</option>
<option>Department Chief</option>
<option>Department Assistant</option>
</select>

<input id="c_name" placeholder="Name"/>
<input id="c_department" placeholder="Department (optional)"/>

<input id="c_yearFrom" type="number" placeholder="Year From"/>
<input id="c_yearTo" type="number" placeholder="Year To"/>

<select id="c_active">
<option value="true">Active</option>
<option value="false">Inactive</option>
</select>

<input id="c_photo" type="file" accept="image/*"/>
</div>

<br>
<button class="btn" id="c_save">Save</button>

<table class="table">
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Position</th>
<th>Years</th>
<th>Active</th>
<th>Action</th>
</tr>
</thead>
<tbody id="c_table"></tbody>
</table>
</div>

<!-- ================= Volunteer Manager ================= -->

<div class="panel">
<h2>Volunteer Members</h2>

<div class="grid">
<select id="m_unit">
<option value="upazila">Upazila</option>
<option value="school">School</option>
</select>

<input id="m_name" placeholder="Name"/>
<input id="m_position" value="Volunteer"/>
<input id="m_yearFrom" type="number" placeholder="Year From"/>
<input id="m_yearTo" type="number" placeholder="Year To"/>

<select id="m_active">
<option value="true">Active</option>
<option value="false">Inactive</option>
</select>

<input id="m_photo" type="file" accept="image/*"/>
</div>

<br>
<button class="btn" id="m_save">Save</button>

<table class="table">
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Position</th>
<th>Years</th>
<th>Active</th>
<th>Action</th>
</tr>
</thead>
<tbody id="m_table"></tbody>
</table>
</div>

</div>

<script type="module">

import { FIREBASE_CONFIG, uploadToCloudinary } from "../assets/app.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  updateDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);

async function loadCommittee(){
  const snap = await getDocs(collection(db,"committee"));
  const table = document.getElementById("c_table");
  table.innerHTML="";
  snap.forEach(d=>{
    const x=d.data();
    table.innerHTML+=`
    <tr>
      <td>${x.photoUrl?`<img src="${x.photoUrl}" class="avatar"/>`:""}</td>
      <td>${x.name}</td>
      <td>${x.position}</td>
      <td>${x.yearFrom}-${x.yearTo}</td>
      <td>${x.isActive}</td>
      <td>
        <button onclick="editCommittee('${d.id}')">Edit</button>
        <button class="danger" onclick="deleteCommittee('${d.id}')">Delete</button>
      </td>
    </tr>`;
  });
}

async function loadMembers(){
  const snap = await getDocs(collection(db,"members"));
  const table = document.getElementById("m_table");
  table.innerHTML="";
  snap.forEach(d=>{
    const x=d.data();
    table.innerHTML+=`
    <tr>
      <td>${x.photoUrl?`<img src="${x.photoUrl}" class="avatar"/>`:""}</td>
      <td>${x.name}</td>
      <td>${x.position}</td>
      <td>${x.yearFrom}-${x.yearTo}</td>
      <td>${x.isActive}</td>
      <td>
        <button onclick="editMember('${d.id}')">Edit</button>
        <button class="danger" onclick="deleteMember('${d.id}')">Delete</button>
      </td>
    </tr>`;
  });
}

document.getElementById("c_save").onclick=async()=>{
  const file=document.getElementById("c_photo").files[0];
  let photoUrl="";
  if(file) photoUrl=await uploadToCloudinary(file);

  await addDoc(collection(db,"committee"),{
    unitType:c_unit.value,
    position:c_position.value,
    name:c_name.value,
    department:c_department.value,
    yearFrom:Number(c_yearFrom.value),
    yearTo:Number(c_yearTo.value),
    isActive:c_active.value==="true",
    photoUrl
  });

  loadCommittee();
};

document.getElementById("m_save").onclick=async()=>{
  const file=document.getElementById("m_photo").files[0];
  let photoUrl="";
  if(file) photoUrl=await uploadToCloudinary(file);

  await addDoc(collection(db,"members"),{
    unitType:m_unit.value,
    position:m_position.value,
    name:m_name.value,
    yearFrom:Number(m_yearFrom.value),
    yearTo:Number(m_yearTo.value),
    isActive:m_active.value==="true",
    photoUrl
  });

  loadMembers();
};

window.deleteCommittee=async(id)=>{
  await deleteDoc(doc(db,"committee",id));
  loadCommittee();
};

window.deleteMember=async(id)=>{
  await deleteDoc(doc(db,"members",id));
  loadMembers();
};

loadCommittee();
loadMembers();

</script>
</body>
</html>
